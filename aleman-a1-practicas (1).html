<!DOCTYPE html>
<html lang="es">
<head>
<meta charset="UTF-8"/>
<meta name="viewport" content="width=device-width, initial-scale=1.0"/>
<title>Deutsch A1 · Prácticas Interactivas</title>
<link href="https://fonts.googleapis.com/css2?family=Outfit:wght@400;500;600;700;800&family=JetBrains+Mono:wght@400;500&display=swap" rel="stylesheet"/>
<style>
:root {
  --negro:    #0D1117;
  --carbon:   #161B22;
  --panel:    #1C2333;
  --borde:    #30363D;
  --azul:     #2563EB;
  --azul-lt:  #1D3461;
  --azul-glow:#3B82F6;
  --verde:    #10B981;
  --verde-lt: #064E3B;
  --rojo:     #EF4444;
  --rojo-lt:  #4B1C1C;
  --amarillo: #F59E0B;
  --texto:    #E2E8F0;
  --muted:    #8B949E;
  --blanco:   #F0F6FC;
}
*,*::before,*::after{box-sizing:border-box;margin:0;padding:0}
html{scroll-behavior:smooth}
body{
  font-family:'Outfit',sans-serif;
  background:var(--negro);
  color:var(--texto);
  min-height:100vh;
}

/* ── SIDEBAR ── */
.layout{display:flex;min-height:100vh}
.sidebar{
  width:260px;
  flex-shrink:0;
  background:var(--carbon);
  border-right:1px solid var(--borde);
  display:flex;
  flex-direction:column;
  position:fixed;
  top:0;left:0;
  height:100vh;
  overflow-y:auto;
  z-index:50;
  transition:transform 0.3s;
}
.sidebar-head{
  padding:20px 16px 16px;
  border-bottom:1px solid var(--borde);
  position:sticky;top:0;
  background:var(--carbon);
  z-index:2;
}
.sidebar-logo{
  font-size:20px;font-weight:800;color:var(--blanco);
  display:flex;align-items:center;gap:8px;margin-bottom:4px;
}
.sidebar-logo span{
  background:var(--azul);
  color:#fff;
  font-size:12px;
  font-weight:700;
  padding:2px 8px;
  border-radius:4px;
  letter-spacing:0.06em;
}
.sidebar-score{
  font-size:12px;color:var(--muted);
  display:flex;align-items:center;gap:6px;margin-top:6px;
}
.score-pill{
  background:var(--azul-lt);
  color:var(--azul-glow);
  font-weight:700;
  font-size:13px;
  padding:2px 10px;
  border-radius:20px;
  font-family:'JetBrains Mono',monospace;
}
.sidebar-nav{padding:10px 0 20px}
.nav-tema{
  display:flex;align-items:center;gap:8px;
  padding:8px 16px;
  font-size:13px;
  font-weight:500;
  color:var(--muted);
  cursor:pointer;
  border-left:3px solid transparent;
  transition:all 0.15s;
  line-height:1.3;
}
.nav-tema:hover{color:var(--blanco);background:rgba(255,255,255,0.04)}
.nav-tema.activo{color:var(--azul-glow);border-left-color:var(--azul-glow);background:rgba(37,99,235,0.1)}
.nav-tema.done{color:var(--verde)}
.nav-tema .check{font-size:11px;margin-left:auto;flex-shrink:0}
.nav-num{
  font-family:'JetBrains Mono',monospace;
  font-size:10px;
  color:var(--borde);
  min-width:18px;
  flex-shrink:0;
}

/* ── HAMBURGER ── */
.hamburger{
  display:none;
  position:fixed;top:14px;left:14px;z-index:200;
  background:var(--azul);
  border:none;border-radius:8px;
  width:38px;height:38px;
  cursor:pointer;
  flex-direction:column;align-items:center;justify-content:center;gap:5px;
}
.hamburger span{display:block;width:18px;height:2px;background:#fff;border-radius:2px}
.overlay{display:none;position:fixed;inset:0;background:rgba(0,0,0,0.6);z-index:40}

/* ── MAIN ── */
.main{
  margin-left:260px;
  flex:1;
  padding:32px 24px 64px;
  max-width:820px;
}

/* ── HEADER TEMA ── */
.tema-header{
  display:flex;align-items:flex-start;gap:14px;
  margin-bottom:28px;padding-bottom:20px;
  border-bottom:1px solid var(--borde);
}
.tema-icon{
  width:48px;height:48px;
  border-radius:12px;
  background:var(--azul);
  display:flex;align-items:center;justify-content:center;
  font-size:22px;
  flex-shrink:0;
}
.tema-title{font-size:24px;font-weight:800;color:var(--blanco);line-height:1.2}
.tema-sub{font-size:13px;color:var(--muted);margin-top:3px}
.tema-progress{
  margin-left:auto;text-align:right;flex-shrink:0;
}
.tema-progress .pts{
  font-family:'JetBrains Mono',monospace;
  font-size:22px;font-weight:700;color:var(--azul-glow);
}
.tema-progress .pts-label{font-size:11px;color:var(--muted)}

/* ── SECCIÓN TIPO ── */
.tipo-section{margin-bottom:32px}
.tipo-label{
  display:flex;align-items:center;gap:8px;
  font-size:11px;font-weight:700;
  text-transform:uppercase;letter-spacing:0.1em;
  color:var(--muted);
  margin-bottom:14px;
}
.tipo-label::after{content:'';flex:1;height:1px;background:var(--borde)}
.tipo-badge{
  padding:3px 10px;border-radius:4px;
  font-size:10px;font-weight:700;letter-spacing:0.08em;
}
.badge-mc  {background:#1D3461;color:#60A5FA}
.badge-fill{background:#064E3B;color:#34D399}
.badge-tr  {background:#3D1D00;color:#FBBF24}

/* ── TARJETA EJERCICIO ── */
.ejercicio{
  background:var(--panel);
  border:1px solid var(--borde);
  border-radius:12px;
  padding:18px 20px;
  margin-bottom:12px;
  transition:border-color 0.2s;
}
.ejercicio.correcto{border-color:var(--verde)}
.ejercicio.incorrecto{border-color:var(--rojo)}
.ej-num{
  font-family:'JetBrains Mono',monospace;
  font-size:10px;color:var(--muted);
  margin-bottom:8px;
}
.ej-pregunta{
  font-size:15px;font-weight:600;color:var(--blanco);
  line-height:1.5;margin-bottom:14px;
}
.ej-pregunta em{font-style:normal;color:var(--azul-glow)}

/* Opciones selección múltiple */
.opciones{display:flex;flex-direction:column;gap:7px}
.opcion{
  display:flex;align-items:center;gap:10px;
  padding:10px 14px;
  border-radius:8px;
  border:1.5px solid var(--borde);
  background:var(--carbon);
  cursor:pointer;
  font-size:14px;font-weight:500;
  color:var(--texto);
  transition:all 0.15s;
  text-align:left;
  font-family:'Outfit',sans-serif;
}
.opcion:hover:not(:disabled){border-color:var(--azul-glow);color:var(--blanco);background:rgba(37,99,235,0.1)}
.opcion.sel-correcta{border-color:var(--verde)!important;background:rgba(16,185,129,0.12)!important;color:#6EE7B7!important}
.opcion.sel-incorrecta{border-color:var(--rojo)!important;background:rgba(239,68,68,0.1)!important;color:#FCA5A5!important}
.opcion.sel-reveal{border-color:var(--verde)!important;background:rgba(16,185,129,0.07)!important;color:#6EE7B7!important}
.opcion:disabled{cursor:default}
.opcion-letra{
  width:24px;height:24px;border-radius:6px;
  background:var(--borde);
  display:flex;align-items:center;justify-content:center;
  font-size:11px;font-weight:700;font-family:'JetBrains Mono',monospace;
  flex-shrink:0;
}

/* Input completar */
.fill-wrap{display:flex;gap:10px;align-items:center;flex-wrap:wrap}
.fill-input{
  font-family:'JetBrains Mono',monospace;
  font-size:15px;font-weight:500;
  padding:9px 14px;
  background:var(--carbon);
  border:1.5px solid var(--borde);
  border-radius:8px;
  color:var(--blanco);
  outline:none;
  min-width:160px;
  transition:border-color 0.2s;
}
.fill-input:focus{border-color:var(--azul-glow)}
.fill-input.ok{border-color:var(--verde)!important;color:#6EE7B7}
.fill-input.err{border-color:var(--rojo)!important;color:#FCA5A5}
.fill-input:disabled{cursor:default}
.btn-check{
  font-family:'Outfit',sans-serif;
  font-size:13px;font-weight:700;
  padding:9px 18px;
  border-radius:8px;border:none;
  background:var(--azul);color:#fff;
  cursor:pointer;transition:all 0.15s;
  white-space:nowrap;
}
.btn-check:hover:not(:disabled){background:var(--azul-glow);transform:translateY(-1px)}
.btn-check:disabled{background:var(--borde);color:var(--muted);cursor:default;transform:none}

/* Traducir */
.tr-area{width:100%}
.tr-input{
  width:100%;
  font-family:'Outfit',sans-serif;
  font-size:14px;
  padding:11px 14px;
  background:var(--carbon);
  border:1.5px solid var(--borde);
  border-radius:8px;
  color:var(--blanco);
  outline:none;
  resize:none;
  min-height:52px;
  transition:border-color 0.2s;
  margin-bottom:10px;
}
.tr-input:focus{border-color:var(--azul-glow)}
.tr-input.ok{border-color:var(--verde);color:#6EE7B7}
.tr-input.err{border-color:var(--rojo);color:#FCA5A5}
.tr-input:disabled{cursor:default}

/* Retroalimentación */
.feedback{
  display:none;
  margin-top:10px;
  padding:10px 14px;
  border-radius:8px;
  font-size:13px;line-height:1.6;
}
.feedback.ok{
  display:block;
  background:rgba(16,185,129,0.1);
  border:1px solid rgba(16,185,129,0.3);
  color:#6EE7B7;
}
.feedback.err{
  display:block;
  background:rgba(239,68,68,0.08);
  border:1px solid rgba(239,68,68,0.25);
  color:#FCA5A5;
}
.feedback strong{font-weight:700}

/* ── BARRA PROGRESO TEMA ── */
.prog-bar-wrap{
  background:var(--borde);
  border-radius:20px;height:4px;
  margin-bottom:24px;overflow:hidden;
}
.prog-bar{
  height:100%;
  background:linear-gradient(90deg,var(--azul),var(--verde));
  border-radius:20px;
  transition:width 0.4s ease;
}

/* ── PANTALLA INICIO ── */
.inicio{
  display:flex;flex-direction:column;
  align-items:center;justify-content:center;
  min-height:60vh;text-align:center;padding:40px 20px;
}
.inicio-flag{font-size:72px;margin-bottom:20px}
.inicio h1{font-size:36px;font-weight:800;color:var(--blanco);margin-bottom:10px}
.inicio p{font-size:16px;color:var(--muted);max-width:420px;line-height:1.7;margin-bottom:30px}
.stats-grid{
  display:grid;grid-template-columns:repeat(3,1fr);
  gap:12px;width:100%;max-width:380px;margin-bottom:32px;
}
.stat-card{
  background:var(--panel);border:1px solid var(--borde);
  border-radius:10px;padding:14px;
}
.stat-card .num{font-family:'JetBrains Mono',monospace;font-size:24px;font-weight:700;color:var(--azul-glow)}
.stat-card .lbl{font-size:11px;color:var(--muted);margin-top:2px}
.btn-start{
  font-family:'Outfit',sans-serif;
  font-size:16px;font-weight:700;
  padding:14px 36px;
  background:var(--azul);color:#fff;
  border:none;border-radius:10px;cursor:pointer;
  transition:all 0.2s;
}
.btn-start:hover{background:var(--azul-glow);transform:translateY(-2px);box-shadow:0 8px 24px rgba(37,99,235,0.3)}

/* ── RESUMEN TEMA ── */
.resumen{
  background:var(--panel);border:1px solid var(--borde);
  border-radius:14px;padding:28px;text-align:center;
  margin-top:16px;display:none;
}
.resumen.visible{display:block}
.resumen h3{font-size:20px;font-weight:800;color:var(--blanco);margin-bottom:6px}
.resumen .big-score{
  font-family:'JetBrains Mono',monospace;
  font-size:48px;font-weight:700;
  color:var(--azul-glow);margin:12px 0;
}
.resumen p{font-size:14px;color:var(--muted);margin-bottom:20px}
.btn-sig{
  font-family:'Outfit',sans-serif;
  font-size:14px;font-weight:700;
  padding:12px 28px;
  background:var(--verde);color:#fff;
  border:none;border-radius:8px;cursor:pointer;
  transition:all 0.2s;
}
.btn-sig:hover{background:#059669;transform:translateY(-1px)}

/* ── RESPONSIVE ── */
@media(max-width:768px){
  .sidebar{transform:translateX(-100%)}
  .sidebar.open{transform:translateX(0)}
  .overlay.open{display:block}
  .main{margin-left:0;padding:20px 16px 64px}
  .hamburger{display:flex}
  .main{padding-top:64px}
  .stats-grid{grid-template-columns:repeat(3,1fr)}
}
</style>
</head>
<body>

<button class="hamburger" id="ham" onclick="toggleSidebar()">
  <span></span><span></span><span></span>
</button>
<div class="overlay" id="overlay" onclick="toggleSidebar()"></div>

<div class="layout">

<!-- SIDEBAR -->
<nav class="sidebar" id="sidebar">
  <div class="sidebar-head">
    <div class="sidebar-logo">🇩🇪 Deutsch <span>A1</span></div>
    <div class="sidebar-score">
      Puntuación total: <span class="score-pill" id="score-total">0</span>
    </div>
  </div>
  <div class="sidebar-nav" id="sidebar-nav">
    <!-- generado por JS -->
  </div>
</nav>

<!-- MAIN -->
<main class="main" id="main-content">
  <!-- Pantalla inicio -->
  <div class="inicio" id="pantalla-inicio">
    <div class="inicio-flag">🇩🇪</div>
    <h1>Prácticas de Alemán</h1>
    <p>27 temas del nivel A1 con ejercicios de selección múltiple, completar espacios y traducción. Con puntuación y retroalimentación inmediata.</p>
    <div class="stats-grid">
      <div class="stat-card"><div class="num">27</div><div class="lbl">Temas</div></div>
      <div class="stat-card"><div class="num">3</div><div class="lbl">Tipos</div></div>
      <div class="stat-card"><div class="num">~270</div><div class="lbl">Ejercicios</div></div>
    </div>
    <button class="btn-start" onclick="iniciarCurso()">Comenzar →</button>
  </div>

  <!-- Contenido del tema (oculto inicialmente) -->
  <div id="pantalla-tema" style="display:none"></div>
</main>

</div>

<script>
// ══════════════════════════════════════════════════════════════
// DATOS: 27 temas con ejercicios
// ══════════════════════════════════════════════════════════════
const TEMAS = [
{
  id:0, titulo:"Artículo", icono:"📰",
  mc:[
    {p:"¿Cuál es el artículo de <em>Hund</em> (perro)?",ops:["der","die","das","den"],r:0,exp:"Hund es masculino → der Hund."},
    {p:"¿Cuál es el artículo de <em>Frau</em> (mujer)?",ops:["der","die","das","dem"],r:1,exp:"Frau es femenino → die Frau."},
    {p:"¿Cuál es el artículo de <em>Kind</em> (niño)?",ops:["der","die","das","den"],r:2,exp:"Kind es neutro → das Kind."},
    {p:"¿Cuál es el artículo de <em>Mann</em> (hombre)?",ops:["der","die","das","dem"],r:0,exp:"Mann es masculino → der Mann."},
    {p:"¿Cuál es el artículo de <em>Buch</em> (libro)?",ops:["der","die","das","den"],r:2,exp:"Buch es neutro → das Buch."},
    {p:"¿Cuál es el artículo indefinido masculino?",ops:["ein","eine","einen","einer"],r:0,exp:"Masculino nominativo → ein. Ej: ein Mann."},
    {p:"¿Cuál es el artículo indefinido femenino?",ops:["ein","eine","einen","einer"],r:1,exp:"Femenino → eine. Ej: eine Frau."},
    {p:"¿Cuál es el artículo de <em>Auto</em> (carro)?",ops:["der","die","das","dem"],r:2,exp:"Auto es neutro → das Auto."},
    {p:"¿Cuál es el artículo de <em>Stadt</em> (ciudad)?",ops:["der","die","das","dem"],r:1,exp:"Stadt es femenino → die Stadt."},
    {p:"¿Cuál es el artículo de <em>Tisch</em> (mesa)?",ops:["der","die","das","dem"],r:0,exp:"Tisch es masculino → der Tisch."},
  ],
  fill:[
    {p:"___ Hund ist groß. (El perro es grande)",ans:["Der"],exp:"Hund = masculino → Der"},
    {p:"___ Kind schläft. (El niño duerme)",ans:["Das"],exp:"Kind = neutro → Das"},
    {p:"Ich habe ___ Buch. (Tengo un libro)",ans:["ein"],exp:"Buch neutro, acusativo → ein"},
    {p:"___ Frau singt. (La mujer canta)",ans:["Die"],exp:"Frau = femenino → Die"},
    {p:"Das ist ___ Auto. (Ese es un carro)",ans:["ein"],exp:"Auto neutro indefinido → ein"},
    {p:"___ Mann liest. (El hombre lee)",ans:["Der"],exp:"Mann = masculino → Der"},
    {p:"Ich sehe ___ Frau. (Veo una mujer)",ans:["eine"],exp:"Frau femenino, acusativo → eine"},
    {p:"___ Stadt ist schön. (La ciudad es bonita)",ans:["Die"],exp:"Stadt = femenino → Die"},
    {p:"Er kauft ___ Tisch. (Él compra una mesa)",ans:["einen"],exp:"Tisch masculino acusativo → einen"},
    {p:"___ Buch ist neu. (El libro es nuevo)",ans:["Das"],exp:"Buch = neutro → Das"},
  ],
  tr:[
    {p:"Traduce al alemán: 'El perro'",ans:["der Hund","Der Hund"],exp:"Masculino → der Hund"},
    {p:"Traduce al alemán: 'La mujer'",ans:["die Frau","Die Frau"],exp:"Femenino → die Frau"},
    {p:"Traduce al alemán: 'El niño'",ans:["das Kind","Das Kind"],exp:"Neutro → das Kind"},
    {p:"Traduce: 'Un hombre'",ans:["ein Mann"],exp:"Masculino indefinido → ein Mann"},
    {p:"Traduce: 'Una mujer'",ans:["eine Frau"],exp:"Femenino indefinido → eine Frau"},
    {p:"Traduce: 'El libro'",ans:["das Buch","Das Buch"],exp:"Neutro → das Buch"},
    {p:"Traduce: 'El carro'",ans:["das Auto","Das Auto"],exp:"Neutro → das Auto"},
    {p:"Traduce: 'La ciudad'",ans:["die Stadt","Die Stadt"],exp:"Femenino → die Stadt"},
    {p:"Traduce: 'Un niño'",ans:["ein Kind"],exp:"Neutro indefinido → ein Kind"},
    {p:"Traduce: 'La mesa'",ans:["der Tisch","Der Tisch"],exp:"Masculino → der Tisch"},
  ]
},
{
  id:1, titulo:"Cómo elegir palabras", icono:"💬",
  mc:[
    {p:"¿Cómo se dice 'también' en alemán?",ops:["auch","noch","schon","immer"],r:0,exp:"'auch' = también. Ej: Ich auch = Yo también."},
    {p:"¿Qué significa 'sehr'?",ops:["poco","nada","muy","siempre"],r:2,exp:"'sehr' = muy. Ej: sehr gut = muy bien."},
    {p:"¿Cómo se dice 'o' (disyuntiva)?",ops:["und","oder","aber","denn"],r:1,exp:"'oder' = o. Ej: Tee oder Kaffee."},
    {p:"¿Qué significa 'vielleicht'?",ops:["seguro","nunca","quizás","siempre"],r:2,exp:"'vielleicht' = quizás / tal vez."},
    {p:"¿Cómo se dice 'y' (conjunción)?",ops:["aber","oder","und","weil"],r:2,exp:"'und' = y. Ej: Brot und Butter."},
    {p:"¿Qué significa 'jetzt'?",ops:["ayer","ahora","mañana","tarde"],r:1,exp:"'jetzt' = ahora. Ej: Ich bin jetzt hier."},
    {p:"¿Cómo se dice 'aquí'?",ops:["dort","hier","nie","wann"],r:1,exp:"'hier' = aquí. 'dort' = allá."},
    {p:"¿Qué significa 'nicht'?",ops:["sí","también","no/no es","muy"],r:2,exp:"'nicht' = no (negación). Ej: Ich bin nicht müde."},
    {p:"¿Cómo se dice 'siempre'?",ops:["nie","manchmal","immer","oft"],r:2,exp:"'immer' = siempre. 'nie' = nunca."},
    {p:"¿Qué significa 'warum'?",ops:["cuándo","cómo","dónde","por qué"],r:3,exp:"'warum' = por qué. Ej: Warum kommst du?"},
  ],
  fill:[
    {p:"Ich lerne ___ Deutsch. (También aprendo alemán)",ans:["auch"],exp:"'auch' = también"},
    {p:"Das ist ___ gut! (¡Eso es muy bueno!)",ans:["sehr"],exp:"'sehr' = muy"},
    {p:"Kaffee ___ Tee? (¿Café o té?)",ans:["oder"],exp:"'oder' = o"},
    {p:"Ich bin ___ hier. (Estoy aquí ahora)",ans:["jetzt"],exp:"'jetzt' = ahora"},
    {p:"Er kommt ___ nicht. (Él quizás no viene)",ans:["vielleicht"],exp:"'vielleicht' = quizás"},
    {p:"Ich bin ___ müde. (Yo no estoy cansado)",ans:["nicht"],exp:"'nicht' = negación"},
    {p:"Sie ist ___ hier. (Ella siempre está aquí)",ans:["immer"],exp:"'immer' = siempre"},
    {p:"Brot ___ Wasser. (Pan y agua)",ans:["und"],exp:"'und' = y"},
    {p:"___ kommst du? (¿Por qué vienes?)",ans:["Warum"],exp:"'Warum' = por qué"},
    {p:"Ich bin ___ hier. (Estoy aquí)",ans:["hier"],exp:"'hier' = aquí"},
  ],
  tr:[
    {p:"Traduce: 'Yo también'",ans:["Ich auch"],exp:"Ich = yo, auch = también"},
    {p:"Traduce: '¿Por qué?'",ans:["Warum?","Warum"],exp:"Warum = por qué"},
    {p:"Traduce: 'Muy bien'",ans:["Sehr gut"],exp:"sehr = muy, gut = bien"},
    {p:"Traduce: '¿Café o té?'",ans:["Kaffee oder Tee?","Kaffee oder Tee"],exp:"oder = o"},
    {p:"Traduce: 'Ahora no'",ans:["Jetzt nicht"],exp:"Jetzt = ahora, nicht = no"},
    {p:"Traduce: 'Pan y agua'",ans:["Brot und Wasser"],exp:"und = y"},

// ══════════════════════════════════════════════════════════════
// ESTADO GLOBAL
// ══════════════════════════════════════════════════════════════
let temaActual = 0;
let puntosTotal = 0;
let puntosPorTema = new Array(TEMAS.length).fill(0);
let respondidoPorTema = new Array(TEMAS.length).fill(0);

// ══════════════════════════════════════════════════════════════
// RENDER SIDEBAR
// ══════════════════════════════════════════════════════════════
function renderSidebar() {
  const nav = document.getElementById('sidebar-nav');
  nav.innerHTML = TEMAS.map((t, i) => `
    <div class="nav-tema ${i === temaActual ? 'activo' : ''} ${respondidoPorTema[i] >= 30 ? 'done' : ''}"
         onclick="cargarTema(${i})">
      <span class="nav-num">${String(i+1).padStart(2,'0')}</span>
      ${t.icono} ${t.titulo}
      ${respondidoPorTema[i] > 0 ? `<span class="check">${puntosPorTema[i]}/${respondidoPorTema[i]}</span>` : ''}
    </div>
  `).join('');
  document.getElementById('score-total').textContent = puntosTotal;
}

// ══════════════════════════════════════════════════════════════
// INICIAR CURSO
// ══════════════════════════════════════════════════════════════
function iniciarCurso() {
  document.getElementById('pantalla-inicio').style.display = 'none';
  document.getElementById('pantalla-tema').style.display = 'block';
  cargarTema(0);
}

// ══════════════════════════════════════════════════════════════
// CARGAR TEMA
// ══════════════════════════════════════════════════════════════
function cargarTema(idx) {
  temaActual = idx;
  if(window.innerWidth <= 768) cerrarSidebar();
  renderSidebar();

  const t = TEMAS[idx];
  const totalEjs = t.mc.length + t.fill.length + t.tr.length;
  const respondidos = respondidoPorTema[idx];
  const pct = Math.round((respondidos / totalEjs) * 100);

  document.getElementById('pantalla-tema').innerHTML = `
    <div class="tema-header">
      <div class="tema-icon">${t.icono}</div>
      <div>
        <div class="tema-title">${t.titulo}</div>
        <div class="tema-sub">Tema ${idx+1} de ${TEMAS.length} · ${totalEjs} ejercicios</div>
      </div>
      <div class="tema-progress">
        <div class="pts" id="pts-tema">${puntosPorTema[idx]}</div>
        <div class="pts-label">puntos</div>
      </div>
    </div>
    <div class="prog-bar-wrap"><div class="prog-bar" id="pb" style="width:${pct}%"></div></div>

    <!-- SELECCIÓN MÚLTIPLE -->
    <div class="tipo-section">
      <div class="tipo-label">
        <span class="tipo-badge badge-mc">Selección Múltiple</span>
      </div>
      ${t.mc.map((ej, i) => renderMC(ej, idx, i)).join('')}
    </div>

    <!-- COMPLETAR ESPACIOS -->
    <div class="tipo-section">
      <div class="tipo-label">
        <span class="tipo-badge badge-fill">Completar espacios</span>
      </div>
      ${t.fill.map((ej, i) => renderFill(ej, idx, i)).join('')}
    </div>

    <!-- TRADUCCIÓN -->
    <div class="tipo-section">
      <div class="tipo-label">
        <span class="tipo-badge badge-tr">Traducir</span>
      </div>
      ${t.tr.map((ej, i) => renderTR(ej, idx, i)).join('')}
    </div>

    <div id="resumen-${idx}" class="resumen"></div>
    ${idx < TEMAS.length-1 ? `<button class="btn-sig" style="margin-top:16px;display:none" id="btn-sig-${idx}" onclick="cargarTema(${idx+1})">Siguiente tema →</button>` : ''}
  `;

  window.scrollTo({top:0,behavior:'smooth'});
}

// ══════════════════════════════════════════════════════════════
// RENDER EJERCICIOS
// ══════════════════════════════════════════════════════════════
function renderMC(ej, tIdx, eIdx) {
  const letras = ['A','B','C','D'];
  return `
  <div class="ejercicio" id="mc-${tIdx}-${eIdx}">
    <div class="ej-num">Ejercicio ${eIdx+1}</div>
    <div class="ej-pregunta">${ej.p}</div>
    <div class="opciones">
      ${ej.ops.map((op, oi) => `
        <button class="opcion" onclick="responderMC(${tIdx},${eIdx},${oi},${ej.r})" id="mc-opt-${tIdx}-${eIdx}-${oi}">
          <span class="opcion-letra">${letras[oi]}</span>${op}
        </button>
      `).join('')}
    </div>
    <div class="feedback" id="fb-mc-${tIdx}-${eIdx}"></div>
  </div>`;
}

function renderFill(ej, tIdx, eIdx) {
  return `
  <div class="ejercicio" id="fill-${tIdx}-${eIdx}">
    <div class="ej-num">Ejercicio ${eIdx+1}</div>
    <div class="ej-pregunta">${ej.p}</div>
    <div class="fill-wrap">
      <input class="fill-input" id="fill-inp-${tIdx}-${eIdx}" placeholder="Escribe aquí..."
             onkeydown="if(event.key==='Enter')responderFill(${tIdx},${eIdx})"/>
      <button class="btn-check" id="fill-btn-${tIdx}-${eIdx}" onclick="responderFill(${tIdx},${eIdx})">Verificar</button>
    </div>
    <div class="feedback" id="fb-fill-${tIdx}-${eIdx}"></div>
  </div>`;
}

function renderTR(ej, tIdx, eIdx) {
  return `
  <div class="ejercicio" id="tr-${tIdx}-${eIdx}">
    <div class="ej-num">Ejercicio ${eIdx+1}</div>
    <div class="ej-pregunta">${ej.p}</div>
    <div class="tr-area">
      <input class="tr-input" id="tr-inp-${tIdx}-${eIdx}" placeholder="Escribe tu traducción..."
             onkeydown="if(event.key==='Enter')responderTR(${tIdx},${eIdx})"/>
      <button class="btn-check" id="tr-btn-${tIdx}-${eIdx}" onclick="responderTR(${tIdx},${eIdx})">Verificar</button>
    </div>
    <div class="feedback" id="fb-tr-${tIdx}-${eIdx}"></div>
  </div>`;
}

// ══════════════════════════════════════════════════════════════
// RESPONDER
// ══════════════════════════════════════════════════════════════
function responderMC(tIdx, eIdx, elegida, correcta) {
  const card = document.getElementById(`mc-${tIdx}-${eIdx}`);
  if(card.classList.contains('correcto') || card.classList.contains('incorrecto')) return;

  const t = TEMAS[tIdx];
  const ej = t.mc[eIdx];
  const fb = document.getElementById(`fb-mc-${tIdx}-${eIdx}`);

  // Deshabilitar opciones
  for(let i=0; i<ej.ops.length; i++) {
    const btn = document.getElementById(`mc-opt-${tIdx}-${eIdx}-${i}`);
    btn.disabled = true;
  }

  registrarRespuesta(tIdx);

  if(elegida === correcta) {
    document.getElementById(`mc-opt-${tIdx}-${eIdx}-${elegida}`).classList.add('sel-correcta');
    card.classList.add('correcto');
    fb.className = 'feedback ok';
    fb.innerHTML = `✅ <strong>¡Correcto!</strong> ${ej.exp}`;
    sumarPunto(tIdx);
  } else {
    document.getElementById(`mc-opt-${tIdx}-${eIdx}-${elegida}`).classList.add('sel-incorrecta');
    document.getElementById(`mc-opt-${tIdx}-${eIdx}-${correcta}`).classList.add('sel-reveal');
    card.classList.add('incorrecto');
    fb.className = 'feedback err';
    fb.innerHTML = `❌ <strong>Incorrecto.</strong> La respuesta correcta es: <strong>${ej.ops[correcta]}</strong>. ${ej.exp}`;
  }
}

function responderFill(tIdx, eIdx) {
  const inp = document.getElementById(`fill-inp-${tIdx}-${eIdx}`);
  const btn = document.getElementById(`fill-btn-${tIdx}-${eIdx}`);
  const card = document.getElementById(`fill-${tIdx}-${eIdx}`);
  const fb = document.getElementById(`fb-fill-${tIdx}-${eIdx}`);
  if(inp.disabled) return;

  const ej = TEMAS[tIdx].fill[eIdx];
  const resp = inp.value.trim();
  if(!resp) return;

  inp.disabled = true;
  btn.disabled = true;
  registrarRespuesta(tIdx);

  const correctas = ej.ans.map(a => a.toLowerCase());
  const esCorrecta = correctas.includes(resp.toLowerCase());

  if(esCorrecta) {
    inp.classList.add('ok');
    card.classList.add('correcto');
    fb.className = 'feedback ok';
    fb.innerHTML = `✅ <strong>¡Correcto!</strong> ${ej.exp}`;
    sumarPunto(tIdx);
  } else {
    inp.classList.add('err');
    card.classList.add('incorrecto');
    fb.className = 'feedback err';
    fb.innerHTML = `❌ <strong>Incorrecto.</strong> Respuesta aceptada: <strong>${ej.ans[0]}</strong>. ${ej.exp}`;
  }
}

function responderTR(tIdx, eIdx) {
  const inp = document.getElementById(`tr-inp-${tIdx}-${eIdx}`);
  const btn = document.getElementById(`tr-btn-${tIdx}-${eIdx}`);
  const card = document.getElementById(`tr-${tIdx}-${eIdx}`);
  const fb = document.getElementById(`fb-tr-${tIdx}-${eIdx}`);
  if(inp.disabled) return;

  const ej = TEMAS[tIdx].tr[eIdx];
  const resp = inp.value.trim();
  if(!resp) return;

  inp.disabled = true;
  btn.disabled = true;
  registrarRespuesta(tIdx);

  const correctas = ej.ans.map(a => a.toLowerCase().replace(/[?.!]/g,'').trim());
  const respLimpia = resp.toLowerCase().replace(/[?.!]/g,'').trim();
  const esCorrecta = correctas.includes(respLimpia);

  if(esCorrecta) {
    inp.classList.add('ok');
    card.classList.add('correcto');
    fb.className = 'feedback ok';
    fb.innerHTML = `✅ <strong>¡Correcto!</strong> ${ej.exp}`;
    sumarPunto(tIdx);
  } else {
    inp.classList.add('err');
    card.classList.add('incorrecto');
    fb.className = 'feedback err';
    fb.innerHTML = `❌ <strong>Incorrecto.</strong> Respuesta correcta: <strong>${ej.ans[0]}</strong>. ${ej.exp}`;
  }
}

// ══════════════════════════════════════════════════════════════
// PUNTAJE
// ══════════════════════════════════════════════════════════════
function sumarPunto(tIdx) {
  puntosPorTema[tIdx]++;
  puntosTotal++;
  const el = document.getElementById('pts-tema');
  if(el) el.textContent = puntosPorTema[tIdx];
  document.getElementById('score-total').textContent = puntosTotal;
  actualizarProgreso(tIdx);
}

function registrarRespuesta(tIdx) {
  respondidoPorTema[tIdx]++;
  actualizarProgreso(tIdx);
  verificarCompletado(tIdx);
}

function actualizarProgreso(tIdx) {
  const t = TEMAS[tIdx];
  const total = t.mc.length + t.fill.length + t.tr.length;
  const pct = Math.round((respondidoPorTema[tIdx] / total) * 100);
  const pb = document.getElementById('pb');
  if(pb) pb.style.width = pct + '%';
  renderSidebar();
}

function verificarCompletado(tIdx) {
  const t = TEMAS[tIdx];
  const total = t.mc.length + t.fill.length + t.tr.length;
  if(respondidoPorTema[tIdx] >= total) {
    const pts = puntosPorTema[tIdx];
    const porcentaje = Math.round((pts / total) * 100);
    let emoji = porcentaje >= 80 ? '🏆' : porcentaje >= 60 ? '👍' : '📚';
    const res = document.getElementById(`resumen-${tIdx}`);
    if(res) {
      res.className = 'resumen visible';
      res.innerHTML = `
        <div style="font-size:40px;margin-bottom:8px">${emoji}</div>
        <h3>¡Tema completado!</h3>
        <div class="big-score">${pts}/${total}</div>
        <p>${porcentaje}% de respuestas correctas — ${porcentaje >= 80 ? '¡Excelente trabajo!' : porcentaje >= 60 ? 'Buen trabajo. Sigue practicando.' : 'Sigue practicando este tema.'}</p>
      `;
    }
    const btnSig = document.getElementById(`btn-sig-${tIdx}`);
    if(btnSig) btnSig.style.display = 'inline-block';
  }
}

// ══════════════════════════════════════════════════════════════
// SIDEBAR MÓVIL
// ══════════════════════════════════════════════════════════════
function toggleSidebar() {
  document.getElementById('sidebar').classList.toggle('open');
  document.getElementById('overlay').classList.toggle('open');
}
function cerrarSidebar() {
  document.getElementById('sidebar').classList.remove('open');
  document.getElementById('overlay').classList.remove('open');
}

// INIT
renderSidebar();
</script>
